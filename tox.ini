[tox]
envlist = py39, py310, py311, py312, py313, lint, typecheck
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=7.0
    pytest-cov>=4.0
    pytest-asyncio>=0.21.0
commands =
    pytest -v {posargs}

[testenv:lint]
deps =
    ruff>=0.11.0
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:typecheck]
deps =
    mypy>=1.0
commands =
    mypy src/pyresilience
